spring.application.name=codetracker

spring.datasource.url=jdbc:mysql://localhost:3306/codetracker_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8080

# JWT Configuration
jwt.secret=mySecretKeyForJWTAuthenticationAndAuthorizationPurposesOnlyNotForProductionUse
jwt.expiration=86400000

# Seed data (data.sql runs after Hibernate creates the tables)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true